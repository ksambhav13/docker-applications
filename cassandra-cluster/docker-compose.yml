services:
  cassandra-1:
    image: cassandra:5.0
    environment:
      CASSANDRA_CLUSTER_NAME: cassandra-cluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra-1,cassandra-2
      CASSANDRA_NUM_TOKENS: 16
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 256M
    ports:
      - "9042:9042"
    volumes:
      - cassandra-1-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE CLUSTER' localhost 9042"]
      interval: 15s
      timeout: 10s
      retries: 20
    restart: unless-stopped

  cassandra-2:
    image: cassandra:5.0
    depends_on:
      - cassandra-1
    environment:
      CASSANDRA_CLUSTER_NAME: cassandra-cluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra-1,cassandra-2
      CASSANDRA_NUM_TOKENS: 16
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 256M
    ports:
      - "9043:9042"
    volumes:
      - cassandra-2-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE CLUSTER' localhost 9042"]
      interval: 15s
      timeout: 10s
      retries: 20
    restart: unless-stopped

  cassandra-3:
    image: cassandra:5.0
    depends_on:
      - cassandra-1
      - cassandra-2
    environment:
      CASSANDRA_CLUSTER_NAME: cassandra-cluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra-1,cassandra-2
      CASSANDRA_NUM_TOKENS: 16
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 256M
    ports:
      - "9044:9042"
    volumes:
      - cassandra-3-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE CLUSTER' localhost 9042"]
      interval: 15s
      timeout: 10s
      retries: 20
    restart: unless-stopped

  cassandra-init:
    image: cassandra:5.0
    depends_on:
      cassandra-1:
        condition: service_healthy
      cassandra-2:
        condition: service_healthy
      cassandra-3:
        condition: service_healthy
    volumes:
      - ./initdb:/initdb:ro
    command:
      - sh
      - -c
      - cqlsh cassandra-1 9042 -f /initdb/01-create-keyspace.cql
    restart: "no"

volumes:
  cassandra-1-data:
  cassandra-2-data:
  cassandra-3-data:
