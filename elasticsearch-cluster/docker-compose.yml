services:
  es01:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      node.name: es01
      cluster.name: elasticsearch-cluster
      discovery.seed_hosts: es02,es03
      cluster.initial_master_nodes: es01,es02,es03
      node.roles: master,data
      bootstrap.memory_lock: "true"
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - es01-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
    ulimits:
      memlock:
        soft: -1
        hard: -1
    restart: unless-stopped

  es02:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      node.name: es02
      cluster.name: elasticsearch-cluster
      discovery.seed_hosts: es01,es03
      cluster.initial_master_nodes: es01,es02,es03
      node.roles: master,data
      bootstrap.memory_lock: "true"
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    volumes:
      - es02-data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    restart: unless-stopped

  es03:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      node.name: es03
      cluster.name: elasticsearch-cluster
      discovery.seed_hosts: es01,es02
      cluster.initial_master_nodes: es01,es02,es03
      node.roles: master,data
      bootstrap.memory_lock: "true"
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    volumes:
      - es03-data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    restart: unless-stopped

  elasticsearch-init:
    image: curlimages/curl:8.10.1
    depends_on:
      es01:
        condition: service_healthy
    command:
      - -fsS
      - -X
      - PUT
      - http://es01:9200/_index_template/default-replicas
      - -H
      - "Content-Type: application/json"
      - -d
      - '{"index_patterns":["*"],"priority":0,"template":{"settings":{"number_of_replicas":1}}}'
    restart: "no"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    depends_on:
      es01:
        condition: service_healthy
      elasticsearch-init:
        condition: service_completed_successfully
    environment:
      SERVER_NAME: kibana
      ELASTICSEARCH_HOSTS: http://es01:9200
      XPACK_SECURITY_ENABLED: "false"
    ports:
      - "5601:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5601/api/status || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
    restart: unless-stopped

volumes:
  es01-data:
  es02-data:
  es03-data:
