services:
  redis-node-1:
    image: redis:7.2-alpine
    command:
      - redis-server
      - --port
      - "6379"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "yes"
      - --protected-mode
      - "no"
    ports:
      - "7000:6379"
    volumes:
      - redis-node-1-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-node-2:
    image: redis:7.2-alpine
    command:
      - redis-server
