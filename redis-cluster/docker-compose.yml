  redis-node-6:
    image: redis:7.2-alpine
    command:
      - redis-server
      - --port
      - "6379"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
